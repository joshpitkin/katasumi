name: Publish Core and TUI to npm

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish:
    name: Build and Publish Packages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
      
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build core package
        run: pnpm --filter=@katasumi/core build

      - name: Refresh workspace links after core build
        run: pnpm install --frozen-lockfile

      - name: Build core database for TUI tests
        run: pnpm --filter=@katasumi/core build-db
      
      - name: Build TUI package
        run: pnpm --filter=@katasumi/tui build
      
      - name: Run tests
        run: pnpm --filter=@katasumi/tui test
      
      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Update package versions for release
        run: |
          node -e "const fs=require('fs');const v='${{ steps.get_version.outputs.VERSION }}';const corePath='packages/core/package.json';const tuiPath='packages/tui/package.json';const core=JSON.parse(fs.readFileSync(corePath,'utf8'));core.version=v;fs.writeFileSync(corePath, JSON.stringify(core, null, 2)+'\\n');const tui=JSON.parse(fs.readFileSync(tuiPath,'utf8'));tui.version=v;tui.dependencies=tui.dependencies||{};tui.dependencies['@katasumi/core']='^'+v;fs.writeFileSync(tuiPath, JSON.stringify(tui, null, 2)+'\\n');"

      - name: Copy root README for TUI package
        run: cp README.md packages/tui/README.md

      - name: Copy root LICENSE for published packages
        run: |
          cp LICENSE packages/core/LICENSE
          cp LICENSE packages/tui/LICENSE
      
      - name: Publish core to npm
        run: |
          cd packages/core
          pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish TUI to npm
        run: |
          cd packages/tui
          pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 🎉 Katasumi Packages v${{ steps.get_version.outputs.VERSION }}
            
            ### Installation
            ```bash
            npm install -g @katasumi/tui
            # or
            pnpm add -g @katasumi/tui
            ```
            
            ### What's Changed
            See the commit history for details.
            
            ### Package
            📦 [Core on npm](https://www.npmjs.com/package/@katasumi/core/v/${{ steps.get_version.outputs.VERSION }})
            📦 [View on npm](https://www.npmjs.com/package/@katasumi/tui/v/${{ steps.get_version.outputs.VERSION }})
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify on success
        run: |
          echo "✅ Successfully published @katasumi/core@${{ steps.get_version.outputs.VERSION }} to npm"
          echo "✅ Successfully published @katasumi/tui@${{ steps.get_version.outputs.VERSION }} to npm"
          echo "📦 Core URL: https://www.npmjs.com/package/@katasumi/core/v/${{ steps.get_version.outputs.VERSION }}"
          echo "📦 Package URL: https://www.npmjs.com/package/@katasumi/tui/v/${{ steps.get_version.outputs.VERSION }}"
